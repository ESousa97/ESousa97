name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ESousa97
          outputs: |
            dist/github-contribution-grid-snake-tech.svg?palette=github-dark&color_snake=#4de2ff&color_dots=#0d1117,#0f1f35,#0a6edc,#1aa9ff,#6ef5ff
            dist/github-contribution-grid-snake-tech-light.svg?palette=github-light&color_snake=#0066ff&color_dots=#ffffff,#e7f0ff,#8dc7ff,#4ba3ff,#1d6fff

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
